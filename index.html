<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile header (visible on small screens) -->
  <header class="mobile-header">
    <div class="mobile-header-inner">
      <div>
        <span id="mobile-name" class="mobile-name"></span>
        <span id="mobile-title" class="mobile-title"></span>
      </div>
      <div class="mobile-controls">
        <button id="lang-toggle-mobile" class="lang-btn" aria-label="Toggle language">EN / 中</button>
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <!-- Mobile nav drawer -->
    <nav class="mobile-nav" id="mobile-nav" aria-hidden="true">
      <a href="#about" class="nav-link" data-en="About" data-zh="关于我"></a>
      <a href="#papers" class="nav-link" data-en="Research" data-zh="研究论文"></a>
      <a href="#lectures" class="nav-link" data-en="Teaching" data-zh="讲义"></a>
    </nav>
  </header>

  <div class="layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-inner">

        <!-- Photo -->
        <div class="photo-wrap">
          <img id="profile-photo" src="" alt="Profile photo" class="profile-photo" />
        </div>

        <!-- Name + Title -->
        <div class="sidebar-name-block">
          <h1 id="sidebar-name" class="sidebar-name"></h1>
          <p id="sidebar-title" class="sidebar-title"></p>
          <p id="sidebar-dept" class="sidebar-dept"></p>
          <p id="sidebar-institution" class="sidebar-institution"></p>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav" aria-label="Page sections">
          <a href="#about"    class="nav-link" data-en="About"    data-zh="关于我"></a>
          <a href="#papers"   class="nav-link" data-en="Research" data-zh="研究论文"></a>
          <a href="#lectures" class="nav-link" data-en="Teaching" data-zh="讲义"></a>
        </nav>

        <!-- Contact + CV -->
        <div class="sidebar-contact">
          <a id="sidebar-email" href="" class="contact-link email-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M3 4a2 2 0 0 0-2 2v.217l9 5.25 9-5.25V6a2 2 0 0 0-2-2H3Zm16 3.551-9 5.25-9-5.25V14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7.551Z"/></svg>
            <span id="sidebar-email-text"></span>
          </a>
          <a id="sidebar-cv" href="" class="contact-link cv-link" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M4 4a2 2 0 0 1 2-2h4.586A2 2 0 0 1 12 2.586L15.414 6A2 2 0 0 1 16 7.414V16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4Zm2 6a1 1 0 0 1 1-1h6a1 1 0 1 1 0 2H7a1 1 0 0 1-1-1Zm1 3a1 1 0 1 0 0 2h4a1 1 0 1 0 0-2H7Z" clip-rule="evenodd"/></svg>
            <span data-en="Curriculum Vitae" data-zh="个人简历"></span>
          </a>
        </div>

        <!-- External links (Scholar, SSRN, Twitter) -->
        <div id="sidebar-links" class="sidebar-links"></div>

        <!-- Language toggle -->
        <div class="lang-toggle-wrap">
          <button id="lang-toggle" class="lang-btn" aria-label="Toggle language">
            <span class="lang-opt" id="lang-en-label">EN</span>
            <span class="lang-sep">/</span>
            <span class="lang-opt" id="lang-zh-label">中文</span>
          </button>
        </div>

      </div><!-- /.sidebar-inner -->
    </aside><!-- /.sidebar -->

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="main">

      <!-- Error banner (hidden by default) -->
      <div id="error-banner" class="error-banner" role="alert" hidden>
        <strong>Failed to load site data.</strong>
        <span id="error-message"></span>
      </div>

      <!-- Loading indicator -->
      <div id="loading" class="loading-indicator" aria-live="polite">
        <div class="loading-spinner"></div>
        <span>Loading…</span>
      </div>

      <!-- ── ABOUT ── -->
      <section id="about" class="section" hidden>
        <h2 class="section-heading" data-en="About" data-zh="关于我"></h2>

        <div class="about-grid">
          <!-- Bio text -->
          <div class="bio-text">
            <p id="bio-text" class="bio-paragraph"></p>
            <div id="fields-wrap" class="fields-wrap">
              <span class="fields-label" data-en="Research fields:" data-zh="研究方向："></span>
              <span id="fields-list" class="fields-list"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- ── PAPERS ── -->
      <section id="papers" class="section" hidden>
        <h2 class="section-heading" data-en="Research" data-zh="研究论文"></h2>
        <div id="papers-list" class="papers-list"></div>
      </section>

      <!-- ── LECTURE NOTES ── -->
      <section id="lectures" class="section" hidden>
        <h2 class="section-heading" data-en="Teaching" data-zh="讲义"></h2>
        <div id="lectures-list" class="lectures-list"></div>
      </section>

    </main><!-- /.main-content -->

  </div><!-- /.layout -->

  <script src="app.js"></script>
</body>
</html>
